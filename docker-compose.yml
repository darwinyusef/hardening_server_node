version: '3.9'

# =============================================================
# CEFIT — Módulo Login + Monitoreo
# Servicios: app (Node.js) + db (PostgreSQL 16)
#            prometheus + grafana
#
# Primer arranque — la BD se inicializa automáticamente:
#   1. scripts/migrate.sh  → crea el rol app_user
#   2. database.sql        → crea tablas, índices, datos seed y GRANTs
#
# Uso:
#   cp .env.example .env   # completar todos los valores
#   docker compose up -d
#   docker compose logs -f
#
# Grafana: http://localhost:3001  (admin / ver GRAFANA_PASSWORD en .env)
# =============================================================

services:

  # ── Base de datos PostgreSQL ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cefit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-registro_usuarios}
      # Pasadas al migrate.sh para crear app_user con la clave correcta
      DB_PASSWORD:       ${DB_PASSWORD}
      SCHEMA_FILE:       /tmp/schema.sql
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ──────────────────────────────────────────────────────────
      # INICIALIZACIÓN AUTOMÁTICA (solo en primer arranque)
      # Docker ejecuta todo lo que esté en initdb.d/ cuando el
      # volumen postgres_data está vacío por primera vez.
      # ──────────────────────────────────────────────────────────
      # Paso 1: crea el usuario app_user con mínimo privilegio
      - ./scripts/migrate.sh:/docker-entrypoint-initdb.d/01_migrate.sh:ro
      # Paso 2: aplica el esquema completo (tablas, índices, seed, GRANTs)
      - ./database.sql:/tmp/schema.sql:ro
    # Puerto solo en loopback — no exponer a la red externa
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cefit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-registro_usuarios} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Caddy (reverse proxy + TLS) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: cefit_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3001:3001"
    volumes:
      - ${CADDYFILE:-./Caddyfile.local}:/etc/caddy/Caddyfile:ro
      - ./client:/srv/client:ro
      - ./.well-known:/srv/.well-known:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - cefit_net
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # ── Servidor Node.js ──────────────────────────────────────────
  app:
    build: .
    container_name: cefit_app
    restart: unless-stopped
    # No arranca hasta que la BD supere el healthcheck
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      # Conexión a la BD (usa app_user, no el superusuario postgres)
      DB_USER:                  ${DB_USER:-app_user}
      DB_HOST:                  db
      DB_NAME:                  ${DB_NAME:-registro_usuarios}
      DB_PASSWORD:              ${DB_PASSWORD}
      DB_PORT:                  5432
      DB_SSL:                   "false"
      # JWT
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN:-2h}
      # Correo
      MAIL_USER:                ${MAIL_USER}
      MAIL_PASS:                ${MAIL_PASS}
      # URLs
      APP_URL:                  ${APP_URL:-http://localhost:3000}
      FRONTEND_URL:             ${FRONTEND_URL:-http://localhost:5500}
      ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS:-http://localhost:5500}
      # Recuperación de contraseña
      RECOVERY_TOKEN_MINUTES:   ${RECOVERY_TOKEN_MINUTES:-60}
    # Sin binding al host — solo accesible a través de Caddy (cefit_net)
    networks:
      - cefit_net
    security_opt:
      - no-new-privileges:true
    # Filesystem de solo lectura; /tmp disponible en RAM
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: cefit_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - cefit_net
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: cefit_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         https://grafana.iapixelcode.com
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    # Sin binding al host — solo accesible a través de Caddy
    networks:
      - cefit_net
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

# ── Volúmenes persistentes ────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ── Red interna (app ↔ db, sin acceso cruzado a otros proyectos)
networks:
  cefit_net:
    driver: bridge
