version: '3.9'

services:

  # ── Base de datos PostgreSQL ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cefit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-registro_usuarios}
      # Variables para que migrate.sh cree app_user en primer arranque
      DB_PASSWORD: ${DB_PASSWORD}
      SCHEMA_FILE: /tmp/schema.sql
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script que crea app_user — se ejecuta automáticamente en primer arranque
      - ./scripts/migrate.sh:/docker-entrypoint-initdb.d/01_migrate.sh:ro
      # Esquema de BD montado donde migrate.sh lo espera
      - ./database.sql:/tmp/schema.sql:ro
    # Puerto solo en loopback — no exponer directamente a la red externa
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cefit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-registro_usuarios} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Servidor Node.js ──────────────────────────────────────────
  app:
    build: .
    container_name: cefit_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_USER: ${DB_USER:-app_user}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-registro_usuarios}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 5432
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      APP_URL: ${APP_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5500}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5500}
      RECOVERY_TOKEN_MINUTES: ${RECOVERY_TOKEN_MINUTES:-60}
      # ── Monitoreo ──────────────────────────────────────────────
      # Token opcional para proteger GET /monitor/stats
      # Si se deja vacío el endpoint es libre (solo loopback de todas formas)
      MONITOR_TOKEN: ${MONITOR_TOKEN:-}
    # Puerto en loopback — en producción, poner un reverse proxy (nginx) delante
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - cefit_net
    security_opt:
      - no-new-privileges:true
    # Filesystem de solo lectura; /tmp en RAM
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
    volumes:
      # Volumen con escritura para metrics.jsonl (el resto del FS sigue read_only)
      # En primer arranque Docker copia el contenido de /app/monitorize/ de la imagen
      - metrics_data:/app/monitorize
    # Lanza el colector de métricas en segundo plano cada 60 s y luego node
    command: >
      sh -c "
        (while true; do sh /app/monitorize/collect.sh 2>/dev/null; sleep 60; done) &
        exec node server/server.js
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

volumes:
  postgres_data:
    driver: local
  # Persiste metrics.jsonl entre reinicios del contenedor
  metrics_data:
    driver: local

networks:
  cefit_net:
    driver: bridge
