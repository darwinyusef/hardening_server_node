version: '3.9'

# =============================================================
# CEFIT — Módulo Login
# Servicios: app (Node.js) + db (PostgreSQL 16)
#
# Primer arranque — la BD se inicializa automáticamente:
#   1. scripts/migrate.sh  → crea el rol app_user
#   2. database.sql        → crea tablas, índices, datos seed y GRANTs
#
# Uso:
#   cp .env.example .env   # completar todos los valores
#   docker compose up -d
#   docker compose logs -f
# =============================================================

services:

  # ── Base de datos PostgreSQL ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cefit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-registro_usuarios}
      # Pasadas al migrate.sh para crear app_user con la clave correcta
      DB_PASSWORD:       ${DB_PASSWORD}
      SCHEMA_FILE:       /tmp/schema.sql
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ──────────────────────────────────────────────────────────
      # INICIALIZACIÓN AUTOMÁTICA (solo en primer arranque)
      # Docker ejecuta todo lo que esté en initdb.d/ cuando el
      # volumen postgres_data está vacío por primera vez.
      # ──────────────────────────────────────────────────────────
      # Paso 1: crea el usuario app_user con mínimo privilegio
      - ./scripts/migrate.sh:/docker-entrypoint-initdb.d/01_migrate.sh:ro
      # Paso 2: aplica el esquema completo (tablas, índices, seed, GRANTs)
      - ./database.sql:/tmp/schema.sql:ro
    # Puerto solo en loopback — no exponer a la red externa
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cefit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-registro_usuarios} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Servidor Node.js ──────────────────────────────────────────
  app:
    build: .
    container_name: cefit_app
    restart: unless-stopped
    # No arranca hasta que la BD supere el healthcheck
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      # Conexión a la BD (usa app_user, no el superusuario postgres)
      DB_USER:                  ${DB_USER:-app_user}
      DB_HOST:                  db
      DB_NAME:                  ${DB_NAME:-registro_usuarios}
      DB_PASSWORD:              ${DB_PASSWORD}
      DB_PORT:                  5432
      DB_SSL:                   "false"
      # JWT
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN:-2h}
      # Correo
      MAIL_USER:                ${MAIL_USER}
      MAIL_PASS:                ${MAIL_PASS}
      # URLs
      APP_URL:                  ${APP_URL:-http://localhost:3000}
      FRONTEND_URL:             ${FRONTEND_URL:-http://localhost:5500}
      ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS:-http://localhost:5500}
      # Recuperación de contraseña
      RECOVERY_TOKEN_MINUTES:   ${RECOVERY_TOKEN_MINUTES:-60}
    # Puerto en loopback — en producción poner nginx como reverse proxy
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - cefit_net
    security_opt:
      - no-new-privileges:true
    # Filesystem de solo lectura; /tmp disponible en RAM
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

# ── Volúmenes persistentes ────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Red interna (app ↔ db, sin acceso cruzado a otros proyectos)
networks:
  cefit_net:
    driver: bridge
