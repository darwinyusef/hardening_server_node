# =============================================================
# CEFIT — App + Caddy + Prometheus + Grafana
#
# Seleccionar entorno con --env-file:
#   Local:      docker compose --env-file .env.local up -d
#   Producción: docker compose --env-file .env.prod  up -d
#
# La BD corre en un stack separado (levantar primero):
#   docker compose -f docker-compose.db.yml --env-file .env.local up -d db
#   docker compose -f docker-compose.db.yml --env-file .env.local --profile init up --abort-on-container-exit db-init
# =============================================================

services:

  # ── Servidor Node.js ──────────────────────────────────────────
  app:
    build: .
    container_name: cefit_app
    restart: unless-stopped
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      DB_USER:                  ${DB_USER:-app_user}
      DB_HOST:                  cefit_db
      DB_NAME:                  ${DB_NAME:-registro_usuarios}
      DB_PASSWORD:              ${DB_PASSWORD}
      DB_PORT:                  5432
      DB_SSL:                   "false"
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN:-2h}
      MAIL_USER:                ${MAIL_USER}
      MAIL_PASS:                ${MAIL_PASS}
      APP_URL:                  ${APP_URL}
      FRONTEND_URL:             ${FRONTEND_URL}
      ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS}
      RECOVERY_TOKEN_MINUTES:   ${RECOVERY_TOKEN_MINUTES:-60}
    networks:
      - cefit_db_net
      - cefit_net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Caddy (reverse proxy + TLS) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: cefit_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:3001:3001"
    volumes:
      - ${CADDYFILE}:/etc/caddy/Caddyfile:ro
      - ./client:/srv/client:ro
      - ./.well-known:/srv/.well-known:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - cefit_net
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: cefit_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - cefit_net
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: cefit_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         ${GRAFANA_URL:-https://grafana.iapixelcode.com}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - cefit_net
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

# ── Volúmenes ─────────────────────────────────────────────────
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ── Redes ─────────────────────────────────────────────────────
networks:
  cefit_db_net:
    external: true       # creada por docker-compose.db.yml
    name: cefit_db_net
  cefit_net:
    driver: bridge
