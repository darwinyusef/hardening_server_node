<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' http://localhost:3000">
  <title>Nueva contraseña — CEFIT</title>
  <link rel="stylesheet" href="/client/assets/css/style.css">
</head>
<body>

  <div class="contenedor">
    <div class="marca">
      <span class="marca-nombre">CEFIT</span>
      <span class="marca-sub">Establecer nueva contraseña</span>
    </div>

    <div id="contenidoForm">
      <h1>Nueva contraseña</h1>
      <p>Escribe la nueva contraseña para tu cuenta.</p>

      <form id="formNuevaPassword" novalidate>
        <label for="password">Nueva contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password"
                 placeholder="Mínimo 8 caracteres"
                 autocomplete="new-password" required>
          <button type="button" class="toggle-pass" aria-label="Mostrar contraseña"
                  onclick="togglePass('password', this)">👁</button>
        </div>

        <label for="confirmar">Confirmar contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="confirmar" name="confirmar"
                 placeholder="Repite la contraseña"
                 autocomplete="new-password" required>
          <button type="button" class="toggle-pass" aria-label="Mostrar contraseña"
                  onclick="togglePass('confirmar', this)">👁</button>
        </div>

        <button type="submit" id="btnNueva">Guardar contraseña</button>
      </form>
    </div>

    <div id="mensaje" class="mensaje" role="alert"></div>

    <p class="enlace">
      <a href="/client/index.html" rel="noopener">← Volver al inicio de sesión</a>
    </p>
  </div>

  <script src="/client/assets/js/constantes.js"></script>
  <script src="/client/assets/js/notifications.js"></script>
  <script src="/client/assets/js/nueva_password.js"></script>

</body>
</html>
