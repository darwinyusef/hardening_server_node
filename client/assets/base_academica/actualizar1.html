<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        fetch(`http://localhost:3000/${id}`, { // <-- ID aquí
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                nombre: 'dylan gg'

            })
        })
            .then(res => res.json())
            .then((res) => {
                console.log(res)
            })
            .catch((e) => {
                console.log(e)
            })
    </script>

</body>

</html>
