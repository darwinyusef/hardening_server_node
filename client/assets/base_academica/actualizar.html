<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>

    <form id="formulario">
        <div class="name">
            <label for="into">Name</label>
            <input type="text" id="into">
        </div>
        <br>
        <div class="edad">
            <label for="age">Age</label>
            <input type="number" max="130" min="1" id="age">
        </div>
        <br>
        <div><button type="button">Submit</button></div>

    </form>


    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');


        fetch(`http://localhost:3000/${id}`, { // <-- ID aquíF
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            },

        })
            .then(res => res.json())
            .then((res) => {
                console.log(res)
                if (res.id == "null") {
                    alert("No se encontró el usuario");
                } else {
                    document.getElementById("into").value = res.data.nombre;
                    document.getElementById("age").value = res.data.edad;
                }
            })
            .catch((e) => {
                console.log(e)


        async function actualizarUsuario() {

            data = {
                nombre: document.getElementById("into").value,
                edad: document.getElementById("age").value
            }
            try {
                const res = await fetch(`http://localhost:3000/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const data = await res.json();
                console.log(data);

            } catch (e) {
                console.log(e);
            }
        }

        actualizarUsuario();


    </script>

</body>

</html>
