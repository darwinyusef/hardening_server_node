# =============================================================
# CEFIT — Base de datos PostgreSQL (stack independiente)
#
# Arranque:
#   docker compose -f docker-compose.db.yml --env-file .env.prod up -d db
#
# Primera inicialización (crear app_user + esquema):
#   docker compose -f docker-compose.db.yml --env-file .env.prod --profile init \
#     up --abort-on-container-exit db-init
#
# La red cefit_db_net queda disponible para que docker-compose.yml
# la consuma como red externa.
# =============================================================

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cefit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-registro_usuarios}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cefit_db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-registro_usuarios} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Migración (one-shot, solo con --profile init) ─────────────
  db-init:
    image: postgres:16-alpine
    profiles: ["init"]
    container_name: cefit_db_init
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST:      db
      PGPORT:      5432
      PGUSER:      postgres
      PGPASSWORD:  ${POSTGRES_PASSWORD}
      PGDATABASE:  ${DB_NAME:-registro_usuarios}
      DB_PASSWORD: ${DB_PASSWORD}
      SCHEMA_FILE: /tmp/schema.sql
    volumes:
      - ./scripts/migrate.sh:/tmp/migrate.sh:ro
      - ./database.sql:/tmp/schema.sql:ro
    networks:
      - cefit_db_net
    command: ["sh", "/tmp/migrate.sh"]

# ── Volumen persistente ───────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Red compartida con el stack principal ─────────────────────
networks:
  cefit_db_net:
    name: cefit_db_net
    driver: bridge
